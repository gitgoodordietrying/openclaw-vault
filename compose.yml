# OpenClaw-Vault: Compose Orchestration (Path A — Podman/Docker + mitmproxy)
#
# Usage:
#   podman compose up -d      (or: docker compose up -d)
#   podman compose logs -f     (watch both containers)
#   podman compose down        (graceful shutdown)
#
# Requires: .env file with API keys (see .env.example)

services:
  # --- OpenClaw container (NO external network access) ---
  vault:
    build:
      context: .
      dockerfile: Containerfile
    container_name: openclaw-vault
    read_only: true
    tmpfs:
      - /tmp:size=256m,noexec,nosuid,mode=1777
      - /home/vault/.config:size=64m,noexec,nosuid,uid=1000,gid=1000
      - /home/vault/workspace:size=1g,noexec,nosuid,uid=1000,gid=1000
    security_opt:
      - no-new-privileges:true
      - seccomp=config/vault-seccomp.json
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 4g
    cpus: 2
    networks:
      - vault-internal
    depends_on:
      vault-proxy:
        condition: service_started
    volumes:
      - proxy-ca:/opt/proxy-ca:ro
    environment:
      - HTTP_PROXY=http://vault-proxy:8080
      - HTTPS_PROXY=http://vault-proxy:8080
      - NO_PROXY=localhost,127.0.0.1
      # API keys are NOT here — they live in the proxy only
    stdin_open: true
    tty: true

  # --- mitmproxy sidecar (bridges internal ↔ external) ---
  vault-proxy:
    # mitmproxy 11.1.3 — pinned 2026-02-26
    image: mitmproxy/mitmproxy@sha256:89735e2280557aa7597db3a96edcddd5055a0e30d9db7dfb1bfe12c450c333f1
    container_name: vault-proxy
    command: >
      mitmdump
        --listen-host 0.0.0.0
        --listen-port 8080
        --set block_global=false
        --set block_private=true
        --scripts /opt/vault/vault-proxy.py
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    security_opt:
      - no-new-privileges:true
      - seccomp=config/vault-proxy-seccomp.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 2g
    pids_limit: 128
    volumes:
      - ./proxy/vault-proxy.py:/opt/vault/vault-proxy.py:ro
      - ./proxy/allowlist.txt:/opt/vault/allowlist.txt:ro
      - vault-proxy-logs:/var/log/vault-proxy
      - proxy-ca:/home/mitmproxy/.mitmproxy
    networks:
      - vault-internal
      - vault-external
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Anthropic API version header injected into proxied requests (update when Anthropic releases a new stable version)
      - ANTHROPIC_API_VERSION=${ANTHROPIC_API_VERSION:-2023-06-01}
    # Proxy needs outbound access but vault container does not
    # vault-internal is isolated; vault-external reaches the internet

networks:
  vault-internal:
    internal: true   # No default gateway — vault container is trapped here
  vault-external:
    driver: bridge   # Normal internet access for the proxy only

volumes:
  vault-proxy-logs:
    driver: local
  proxy-ca:
    driver: local
