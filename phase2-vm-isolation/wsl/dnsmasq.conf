# openclaw-VAULT: DNS Allowlist (dnsmasq)
# Only resolve domains on the allowlist. Everything else → NXDOMAIN.
#
# Phase 2 — pairs with wsl.conf for full WSL2 isolation.

# Block everything by default
address=/#/

# Allow LLM APIs
server=/api.anthropic.com/8.8.8.8
server=/api.openai.com/8.8.8.8

# Allow package registries
server=/registry.npmjs.org/8.8.8.8
server=/github.com/8.8.8.8
server=/raw.githubusercontent.com/8.8.8.8

# Allow container registries
server=/docker.io/8.8.8.8
server=/registry-1.docker.io/8.8.8.8
server=/ghcr.io/8.8.8.8

# Log all queries for audit
log-queries
log-facility=/var/log/dnsmasq.log
