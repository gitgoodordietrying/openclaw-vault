# OpenCli-Container: DNS Allowlist (dnsmasq)
# Only resolve domains on the allowlist. Everything else → NXDOMAIN.
#
# Phase 2 — pairs with wsl.conf for full WSL2 isolation.

# Block everything by default
address=/#/

# Allow LLM APIs
# Using Cloudflare DNS (1.1.1.1) — supports DNS-over-HTTPS.
# For stronger privacy, replace with a local resolver (unbound/stubby).
server=/api.anthropic.com/1.1.1.1
server=/api.openai.com/1.1.1.1

# Allow package registries
# registry.npmjs.org is intentionally omitted — npm install runs arbitrary code.
# Uncomment only if you need it and have reviewed the packages.
# server=/registry.npmjs.org/1.1.1.1
# github.com omitted — broad subdomain match includes api.github.com (exfil risk)
server=/raw.githubusercontent.com/1.1.1.1

# Container registries removed — images should be pulled BEFORE entering
# the isolated WSL environment. Pre-pull with:
#   podman pull mitmproxy/mitmproxy@sha256:<digest>
#   podman pull node:20-alpine@sha256:<digest>

# Log all queries for audit
log-queries
log-facility=/var/log/dnsmasq.log
