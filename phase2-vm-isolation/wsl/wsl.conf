# openclaw-VAULT: WSL2 Hardened Configuration
# Place in /etc/wsl.conf inside the dedicated openclaw-vault WSL distro
#
# Phase 2 — not yet implemented. This is the target config.

[automount]
enabled = false          # CRITICAL: no /mnt/c, /mnt/d access to host drives

[interop]
enabled = false          # CRITICAL: no .exe execution from WSL
appendWindowsPath = false

[network]
generateResolvConf = false  # Use our own DNS (dnsmasq allowlist)

[boot]
systemd = true           # Needed for container runtimes

[user]
default = vault          # Non-root default user
